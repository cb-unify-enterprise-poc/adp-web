apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      artifact-url:
        type: string
        required: true
      artifact-type:
        type: string
        required: false
        default: "container"
      environment:
        type: string
        required: true
      jira-project:
        type: string
        required: false
        default: ""
      fix-version:
        type: string
        required: false
        default: ""
      gitops-repo:
        type: string
        required: false
        default: "cb-unify-enterprise-poc/gitops-manifest"

jobs:
  deploy:
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-unify-enterprise-poc/adp-web

      - name: Update GitOps manifest
        id: update-gitops-manifest
        uses: docker://alpine/git:latest
        shell: sh
        run: |
          set -e

          apk add --no-cache sed

          echo "Cloning GitOps repository..."
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ inputs.gitops-repo }}.git gitops-manifest

          cd gitops-manifest

          VALUES_FILE="environments/${{ inputs.environment }}/values.yaml"

          echo "Updating $VALUES_FILE for adp-web"
          echo "Artifact URL: ${{ inputs.artifact-url }}"

          sed -i "/adpWeb:/,/adpAuth:/ s|url: .*|url: ${{ inputs.artifact-url }}|" "$VALUES_FILE"
          sed -i "/adpWeb:/,/adpAuth:/ s|hostname: .*|hostname: adp-web.${{ inputs.environment }}.preview.cb-demos.io|" "$VALUES_FILE"

          git config user.email "cloudbees-demo@cloudbees.com"
          git config user.name "cloudbees-demo"

          git add "$VALUES_FILE"
          git commit -m "Promote adp-web to ${{ inputs.environment }}" || echo "No changes to commit"
          git push

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
          target-environment: ${{ inputs.environment }}

      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            # Deployment Evidence

            **Jira Project:** `${{ inputs.jira-project }}`
            **Fix Version:** `${{ inputs.fix-version }}`
            **Environment:** `${{ inputs.environment }}`
            **GitOps Repo:** `${{ inputs.gitops-repo }}`
            **Artifact Type:** `${{ inputs.artifact-type }}`

            ## Artifact Details
            - Artifact ID: `${{ inputs.artifact-id }}`
            - Artifact URL: `${{ inputs.artifact-url }}`

            ## GitOps Details
            - Updated file: `environments/${{ inputs.environment }}/values.yaml`
            - Updated component: `adp-web`
            - Argo CD application: `${{ inputs.environment }}`

            ## Deployment Endpoint
            [Open service](https://adp-web.${{ inputs.environment }}.preview.cb-demos.io/)

            ## Outcome
            GitOps manifest updated successfully. Argo CD will reconcile the target environment.

            ---
            **Traceability**
            - Workflow Run ID: ${{ cloudbees.run_id }}
          format: MARKDOWN
