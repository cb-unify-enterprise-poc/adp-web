apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      artifact-url:
        type: string
        required: true
      artifact-type:
        type: string
        required: false
        default: "container"
      environment:
        type: string
        required: true
      jira-project:
        type: string
        required: false
        default: ""
      fix-version:
        type: string
        required: false
        default: ""
      gitops-repo:
        type: string
        required: false
        default: ""

jobs:
  deploy:
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-unify-enterprise-poc/adp-web

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install helm chart
        id: install-chart
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: adp-web
          namespace: ${{ vars.namespace }}
          values: |
            image:
              url: ${{ inputs.artifact-url }}
            hostname: adp-web.${{ inputs.environment }}.preview.cb-demos.io

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
          target-environment: ${{ inputs.environment }}

      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            # Deployment Evidence

            **Jira Project:** `${{ inputs.jira-project }}`
            **Fix Version:** `${{ inputs.fix-version }}`
            **Environment:** `${{ inputs.environment }}`
            **GitOps Repo:** `${{ inputs.gitops-repo }}`
            **Artifact Type:** `${{ inputs.artifact-type }}`

            ## Artifact Details
            - Artifact ID: `${{ inputs.artifact-id }}`
            - Artifact URL: `${{ inputs.artifact-url }}`

            ## Deployment Endpoint
            [Open service](https://adp-web.${{ inputs.environment }}.preview.cb-demos.io/)

            ## Outcome
            Deployment completed successfully.

            ---
            **Traceability**
            - Workflow Run ID: ${{ cloudbees.run_id }}
          format: MARKDOWN
